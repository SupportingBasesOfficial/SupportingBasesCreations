version: '3.8'

services:
  app:
    build: .
    ports:
      - 3000:3000
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:pass@db:5432/${project.name}
    depends_on:
      - db
      - cache
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: enterprise-saas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
  cache:
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
